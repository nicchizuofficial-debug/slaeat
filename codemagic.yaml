workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - slaeat
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.nicchizu.slaeat
    scripts:
      - name: Create secrets.dart
        script: |
          echo "const String hotpepperApiKey = '$HOTPEPPER_API_KEY';" > lib/secrets.dart
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=$CM_EXPORT_OPTIONS_PATH
      - name: Find and copy IPA
        script: |
          echo "=== Searching for IPA ==="
          find /Users/builder -name "*.ipa" 2>/dev/null || true
          find . -name "*.ipa" 2>/dev/null || true
          mkdir -p build/ios/ipa
          find /Users/builder -name "*.ipa" -exec cp {} build/ios/ipa/ \; 2>/dev/null || true
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - mt166431@gmail.com
